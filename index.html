<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FeasiPix - AI Photo Editor</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>

    <!-- React Image Crop CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/react-image-crop/dist/ReactCrop.css"
    />

    <style>
      .ReactCrop__crop-selection {
        border: 2px dashed rgba(255, 255, 255, 0.7);
      }
    </style>

    <!-- Import maps polyfill -->
    <script
      async
      src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"
    ></script>

    <!-- Import map (FULLY locked to React 18) -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.0",
    "react-image-crop": "https://esm.sh/react-image-crop@11.0.5",
    "react-compare-image": "https://esm.sh/react-compare-image@3.4.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.21.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>

    <!-- Your main React entry -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
